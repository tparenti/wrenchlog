
services:
  wrenchlog:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    environment:
      - FLASK_ENV=development
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    # For production the frontend service uses the image contents (no host bind mount).
    # Use docker-compose.override.yml for local development to mount the source and
    # preserve container node_modules.
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: ["npm", "run", "dev", "--", "--host"]
