
services:
  wrenchlog:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
  frontend:
    build:
      context: ./frontend
      target: production
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL-}
    ports:
      - "5173:5173"
    # Base compose serves the built frontend from the image.
    # Use docker-compose.override.yml for local development with Vite + HMR.
