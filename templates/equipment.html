{% extends 'base.html' %}
{% block content %}
  <h3>Equipment</h3>
  <form method="post" class="row g-3 mb-4">
    <div class="col-md-4"><input name="name" class="form-control" placeholder="Name" required></div>
    <div class="col-md-4"><input name="serial" class="form-control" placeholder="Serial"></div>
    <div class="col-md-3">
      <select name="owner_id" class="form-select">
        <option value="">No owner</option>
        {% for p in people %}
          <option value="{{ p.id }}">{{ p.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-md-1"><button class="btn btn-primary">Add</button></div>
  </form>
  <ul class="list-group">
    {% for e in equipment %}
      <li class="list-group-item d-flex justify-content-between align-items-center">
        <div>{{ e.name }} {% if e.owner %}— {{ e.owner.name }}{% endif %}</div>
        <div><a class="btn btn-sm btn-outline-secondary" href="/equipment/{{ e.id }}/maintenance">Maintenance</a></div>
      </li>
    {% else %}
      <li class="list-group-item">No equipment</li>
    {% endfor %}
  </ul>
{% endblock %}
