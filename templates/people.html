{% extends 'base.html' %}
{% block content %}
  <h3>People</h3>
  <form method="post" class="row g-3 mb-4">
    <div class="col-md-6"><input name="name" class="form-control" placeholder="Name" required></div>
    <div class="col-md-4"><input name="phone" class="form-control" placeholder="Phone"></div>
    <div class="col-md-2"><button class="btn btn-primary">Add</button></div>
  </form>
  <ul class="list-group">
    {% for p in people %}
      <li class="list-group-item">{{ p.name }} {% if p.phone %} — {{ p.phone }}{% endif %}</li>
    {% else %}
      <li class="list-group-item">No people yet</li>
    {% endfor %}
  </ul>
{% endblock %}
