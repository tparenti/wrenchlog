services:
  wrenchlog:
    volumes:
      - .:/app
    environment:
      - FLASK_ENV=development
      - DEV_FRONTEND_ORIGIN=http://frontend:5173
  frontend:
    build:
      context: ./frontend
      target: dev
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL-}
    volumes:
      - ./frontend:/app:delegated
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_BASE_URL=${VITE_API_BASE_URL-}
